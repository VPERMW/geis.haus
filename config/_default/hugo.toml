# -- Site Configuration --
# Refer to the theme docs for more details about each of these parameters.
# https://nunocoracao.github.io/blowfish/docs/getting-started/

theme = "blowfish"
baseURL = "https://geis.haus/"
defaultContentLanguage = "en"

enableRobotsTXT = true
paginate = 20
summaryLength = 30

buildDrafts = false
buildFuture = false

enableEmoji = true

[languages]
  [languages.en]
    languageName = "English"
    languageCode = "en"
    languageDirection = "ltr" # Left-to-right
    weight = 100 # Order in the switcher

  [languages.da]
    languageName = "Dansk"
    languageCode = "da"
    languageDirection = "ltr"
    weight = 20

  [languages.de]
    languageName = "Deutsch"
    languageCode = "de"
    languageDirection = "ltr"
    weight = 1

[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"
  series = "series"

[sitemap]
  changefreq = 'daily'
  filename = 'sitemap.xml'
  priority = 0.5

[outputs]
  home = ["HTML", "RSS", "JSON"]
