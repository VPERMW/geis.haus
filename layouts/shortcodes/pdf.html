{{ $src := .Get "src" }}
<div style="position: relative; padding-top: 56.25%; height: 0; overflow: hidden;">
  <iframe 
    src="{{ $src }}" 
    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;" 
    title="Embedded PDF Viewer"
    loading="lazy">
  </iframe>
</div>
<p style="text-align: center; font-size: 0.8rem; margin-top: 8px;">
  <a href="{{ $src }}" target="_blank" rel="noopener noreferrer">Download PDF</a> | 
  <a href="{{ $src }}" target="_blank" rel="noopener noreferrer">Open in new tab</a>
</p>
